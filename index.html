<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quantum-Calc Pro v2.6</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.1/math.js"></script>
</head>
<body>
    <div class="calc-card">
        <div class="brand">NEXUS ENGINEERING <span>FX-991</span></div>
        
        <div class="screen">
            <div id="upper-display">∫(f(x), x, a, b)</div>
            <input type="text" id="main-display" placeholder="0" spellcheck="false">
        </div>

        <div class="grid">
            <button class="btn sci" onclick="addText('derivative(\'\', \'x\')')">d/dx</button>
            <button class="btn sci" onclick="addText('simplify(\'\')')">SIMP</button>
            <button class="btn sci" onclick="integratePrompt()">∫ dx</button>
            <button class="btn sci" onclick="addText('solve(\'\', \'x\')')">SOLVE</button>

            <button class="btn" onclick="addText('sin(')">sin</button>
            <button class="btn" onclick="addText('cos(')">cos</button>
            <button class="btn" onclick="addText('tan(')">tan</button>
            <button class="btn" onclick="addText('log(')">log</button>

            <button class="btn" onclick="addText('(')">(</button>
            <button class="btn" onclick="addText(')')">)</button>
            <button class="btn" onclick="addText('^')">xʸ</button>
            <button class="btn red" onclick="clearAll()">AC</button>

            <button class="btn num" onclick="addText('7')">7</button>
            <button class="btn num" onclick="addText('8')">8</button>
            <button class="btn num" onclick="addText('9')">9</button>
            <button class="btn op" onclick="addText('/')">÷</button>

            <button class="btn num" onclick="addText('4')">4</button>
            <button class="btn num" onclick="addText('5')">5</button>
            <button class="btn num" onclick="addText('6')">6</button>
            <button class="btn op" onclick="addText('*')">×</button>

            <button class="btn num" onclick="addText('1')">1</button>
            <button class="btn num" onclick="addText('2')">2</button>
            <button class="btn num" onclick="addText('3')">3</button>
            <button class="btn op" onclick="addText('-')">-</button>

            <button class="btn num" onclick="addText('0')">0</button>
            <button class="btn num" onclick="addText('.')">.</button>
            <button class="btn op" onclick="addText('+')">+</button>
            <button class="btn blue" onclick="solve()">EXE</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
